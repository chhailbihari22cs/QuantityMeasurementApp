# ===============================
# APPLICATION
# ===============================
spring.application.name=quantity-measurement-app
server.port=8080

# ===============================
# DATABASE (DEV - MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/quantitydb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# LOGGING (DEBUG MODE)
# ===============================
logging.level.root=INFO
logging.level.com.quantity_measurement_app=DEBUG
logging.level.org.springframework.security=DEBUG

# ===============================
# JWT CONFIG (DEV)
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===============================
# GOOGLE OAUTH2 (DEV)
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.oauth2.redirect-uri=http://localhost:3000
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

