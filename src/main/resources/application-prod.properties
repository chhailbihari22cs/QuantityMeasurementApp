# ===============================
# APPLICATION
# ===============================
spring.application.name=quantity-measurement-app
server.port=8080

# \u26A0\uFE0F REMOVE context-path (avoid breaking APIs)
# server.servlet.context-path=/api

# ===============================
# DATABASE (PRODUCTION)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/quantity_measurement_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIKARI POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ===============================
# JPA (STRICT)
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ===============================
# JWT (ENV BASED)
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===============================
# GOOGLE OAUTH2 (ENV BASED)
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# ===============================
# LOGGING (PROD)
# ===============================
logging.level.root=WARN
logging.level.com.quantity_measurement_app=INFO

# ===============================
# ERROR HANDLING
# ===============================
server.error.include-message=never
server.error.include-stacktrace=never

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
