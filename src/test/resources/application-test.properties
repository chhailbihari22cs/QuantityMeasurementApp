# Application Configuration - Test Profile
spring.application.name=quantity-measurement-app

# H2 Database Configuration (Testing)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Logging - Test
logging.level.root=WARN
logging.level.com.quantity_measurement_app=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# Server Configuration - No context path for testing (MockMvc incompatibility with security filter chain)
server.port=8080
